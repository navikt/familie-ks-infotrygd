
AZURE_APP_CLIENT_ID: test
AZURE_APP_CLIENT_SECRET: secret

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AZURE_OPENID_CONFIG_ISSUER}
          audiences:
            - ${AZURE_APP_CLIENT_ID}
            - api://${AZURE_APP_CLIENT_ID}

vault:
  password: "src/test/resources/vault/password"
  username: "src/test/resources/vault/username"